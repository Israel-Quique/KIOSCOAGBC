<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KIOSCO AGBC</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8T94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,700,0,0" />
  <link rel="stylesheet" href="style.css">
  <script src="index.js" defer></script>
</head>

<body>
  <header class="page-header">
    <div class="header-brand">
      <img src="correos2.png" alt="Correos de Bolivia" class="brand-logo">
    </div>

    <div class="header-center-title">
      <h1 id="dynamicHeaderTitle"></h1>
    </div>

    <nav class="header-actions">
      <button type="button" class="header-button" id="homeButton" title="Inicio">
        <span class="material-symbols-outlined">home</span>
      </button>
      <button type="button" class="header-button" id="backButton" title="Volver">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
    </nav>
  </header>

  <main class="main-content">
    <section class="iframe-shell" id="iframeShell">
      <div class="frame-stage" id="frameStage">
        <div class="frame-overlay" id="frameOverlay">
          <strong class="overlay-title" id="overlayTitle">Panel principal</strong>
        </div>
        <div class="service-error-state" id="serviceErrorState" aria-live="polite" hidden>
        <div class="loop-wrapper" aria-hidden="true">
          <div class="mountain"></div>
          <div class="hill"></div>
            <div class="tree"></div>
            <div class="tree"></div>
            <div class="tree"></div>
            <div class="rock"></div>
            <div class="truck"></div>
            <div class="wheels"></div>
          </div>
        </div>
        <iframe id="serviceFrame" name="iframe_nacionales" src="index2.html" title="Panel de servicios AGBC"></iframe>
      </div>
    </section>
  </main>

  <div class="external-service-overlay external-service-overlay--modal" id="externalServiceOverlay" hidden>
    <div class="external-service-overlay__backdrop"></div>
    <section class="external-service-overlay__panel" role="dialog" aria-modal="true" aria-labelledby="externalServiceTitle">
      <div class="external-service-overlay__header">
        <div>
          <span class="external-service-overlay__eyebrow">Servicio embebido</span>
          <h2 id="externalServiceTitle">TrackingBO</h2>
          <p id="externalServiceMessage">
            Rastreo de correspondencia abierto dentro del kiosco.
          </p>
        </div>
        <button type="button" class="external-service-overlay__icon-button" id="externalServiceClose" title="Cerrar">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="external-service-overlay__frame-shell">
        <iframe
          id="externalServiceFrame"
          title="TrackingBO"
          loading="lazy"
          referrerpolicy="strict-origin-when-cross-origin"></iframe>
      </div>
      <div class="external-service-overlay__actions">
        <button type="button" class="external-service-overlay__button" id="externalServiceConfirm">Recargar</button>
        <button type="button" class="external-service-overlay__button external-service-overlay__button--secondary" id="externalServiceCancel">
          Cerrar
        </button>
      </div>
    </section>
  </div>
</body>

</html>
